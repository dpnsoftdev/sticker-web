services:
  api:
    image: ${API_IMAGE}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000" # publish local only to Caddy reverse proxy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3000/health-check'', r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on(''error'',()=>process.exit(1));"',
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
